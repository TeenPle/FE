<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://teenple.app/">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>TeenPle</title>
  <style>
:root {
  color-scheme: light;
  --bg: #f7f9fc;
  --surface: #ffffff;
  --text: #17202a;
  --muted: #5f6b7a;
  --line: #dfe6ef;
  --accent: #146ef5;
  --accent-soft: #eaf1ff;
}
* { box-sizing: border-box; }
html { background: var(--bg); }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background: var(--bg);
  line-height: 1.68;
  word-break: keep-all;
  overflow-wrap: anywhere;
}
main {
  width: min(100%, 860px);
  margin: 0 auto;
  padding: 36px 18px 64px;
}
header { padding: 12px 0 24px; }
.kicker {
  margin: 0 0 8px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 800;
}
h1 {
  margin: 0;
  font-size: 28px;
  line-height: 1.25;
  letter-spacing: 0;
}
.summary {
  margin: 12px 0 0;
  color: var(--muted);
  font-size: 14px;
}
.panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 20px 18px;
  box-shadow: 0 8px 24px rgba(20, 40, 80, 0.06);
}
.grid {
  display: grid;
  gap: 12px;
}
.link-row {
  display: block;
  padding: 14px 15px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
  text-decoration: none;
  background: #fff;
}
.link-row strong {
  display: block;
  margin-bottom: 3px;
  color: var(--text);
  font-size: 15px;
}
.link-row span {
  display: block;
  color: var(--muted);
  font-size: 13px;
}
.link-row.primary {
  border-color: #bcd1ff;
  background: var(--accent-soft);
}
a { color: var(--accent); font-weight: 700; text-decoration-thickness: 1px; text-underline-offset: 3px; }
footer { margin-top: 20px; color: var(--muted); font-size: 12px; text-align: center; }
@media (min-width: 640px) {
  main { padding-top: 56px; }
  h1 { font-size: 34px; }
  .panel { padding: 28px; }
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
  </style>
</head>
<body>
  <main>
    <header>
      <p class="kicker">TeenPle</p>
      <h1>TeenPle</h1>
      <p class="summary">TeenPle의 주요 안내와 공식 문서를 확인할 수 있습니다.</p>
    </header>
    <section class="panel grid" aria-label="공식 문서 링크">
      <a class="link-row primary" href="/support">
        <strong>문의하기</strong>
        <span>앱 이용, 계정, 신고, 개인정보 관련 문의</span>
      </a>
      <a class="link-row" href="/privacy">
        <strong>개인정보처리방침</strong>
        <span>개인정보 처리 목적, 항목, 보유 기간, 위탁 안내</span>
      </a>
      <a class="link-row" href="/privacy-consent">
        <strong>개인정보 수집·이용 동의</strong>
        <span>회원가입 및 학교 인증을 위한 필수 동의</span>
      </a>
      <a class="link-row" href="/terms">
        <strong>서비스 이용약관</strong>
        <span>TeenPle 서비스 이용 조건과 회원 의무</span>
      </a>
      <a class="link-row" href="/account-deletion">
        <strong>계정 삭제 안내</strong>
        <span>회원 탈퇴 및 개인정보 삭제 요청 방법</span>
      </a>
    </section>
    <footer>© TeenPle</footer>
  </main>
</body>
</html>
